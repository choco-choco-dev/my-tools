<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, minimum-scale=1, user-scalable=yes"
    />
    <title>ガチャガチャ</title>
    <link rel="stylesheet" href="/css/common.css" type="text/css" />
    <link rel="stylesheet" href="css/gacha-gacha.css" type="text/css" />
    <!-- Google tag (gtag.js) -->
    <script
      async
      src="https://www.googletagmanager.com/gtag/js?id=G-ZZRB24T8SZ"
    ></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag("js", new Date());

      gtag("config", "G-ZZRB24T8SZ");
    </script>
  </head>
  <body>
    <div id="header-div">
      <span id="header" ontouchstart="">ツール置き場</span>
    </div>
    <div id="breadcrumbs_div">
      <span id="breadcrumbs_top" class="link" ontouchstart="">TOP</span>
      <span>/</span>
      <span>ガチャガチャ</span>
    </div>
    <h1>ガチャガチャ</h1>
    <!-- 本体 -->
    <div>
      <!-- 追加エリア -->
      <div>
        <div>名前</div>
        <div>
          <input type="text" id="itemName" maxlength="50" />
        </div>
        <div>個数</div>
        <div>
          <input type="number" id="itemNum" />
        </div>
        <div>
          <button onclick="add()">追加する</button>
        </div>
      </div>
      <!-- 中身エリア -->
      <div>
        <ul>
          <li>
            <p>テスト：<span>0</span></p>
          </li>
        </ul>
      </div>
      <!-- 取り出しエリア -->
      <div>
        <div>
          <button onclick="play()">引く</button>
        </div>
        <div>
          <p>結果</p>
          <span>0</span>
        </div>
      </div>
    </div>
    <script src="/js/common.js"></script>
    <script src="js/gacha-gacha.js"></script>
  </body>
</html>
